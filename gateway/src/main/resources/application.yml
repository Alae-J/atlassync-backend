server:
  port: 8080

spring:
  application:
    name: gateway
  main:
    web-application-type: reactive
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/auth/**

            - id: product-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/products/**

            - id: cart-service-rest
              uri: http://localhost:8083
              predicates:
                - Path=/api/cart/**

            - id: cart-service-websocket
              uri: ws://localhost:8083
              predicates:
                - Path=/ws/**

            - id: session-service-sessions
              uri: http://localhost:8084
              predicates:
                - Path=/api/sessions/**

            - id: session-service-gate
              uri: http://localhost:8084
              predicates:
                - Path=/api/gate/**
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

jwt:
  secret: ${JWT_SECRET:atlassync-dev-secret-key-that-is-at-least-256-bits-long-for-hs256}

management:
  endpoints:
    web:
      exposure:
        include: health,gateway,prometheus

logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.atlassync.gateway: DEBUG
