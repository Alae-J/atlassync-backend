server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://localhost:5432/atlassync_auth
    username: atlassync
    password: atlassync
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true

jwt:
  secret: ${JWT_SECRET:atlassync-dev-secret-key-that-is-at-least-256-bits-long-for-hs256}
  access-expiration: 900000
  refresh-expiration: 604800000

atlassync:
  otp:
    code-length: 6
    ttl: 5m
    resend-cooldown: 30s
    max-attempts: 5
    rate-limit:
      max: 3
      window: 15m
    delivery:
      provider: ${OTP_DELIVERY_PROVIDER:log}   # log | smsgate | whatsapp | brevo
      smsgate:
        base-url: https://api.sms-gate.app/3rdparty/v1
        username: ${SMSGATE_USERNAME:}
        password: ${SMSGATE_PASSWORD:}
      whatsapp:
        base-url: https://graph.facebook.com/v20.0
        phone-number-id:    ${WHATSAPP_PHONE_NUMBER_ID:}
        access-token:       ${WHATSAPP_ACCESS_TOKEN:}
        template-name:      ${WHATSAPP_TEMPLATE_NAME:atlassync_otp}
        language-code:      ${WHATSAPP_LANGUAGE_CODE:en}
        include-otp-button: ${WHATSAPP_INCLUDE_OTP_BUTTON:true}
      brevo:
        base-url:   https://api.brevo.com
        api-key:    ${BREVO_API_KEY:}
        from-email: ${BREVO_FROM_EMAIL:noreply@atlassync.local}
        from-name:  ${BREVO_FROM_NAME:AtlasSync}
        subject:    ${BREVO_SUBJECT:Your AtlasSync verification code}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
